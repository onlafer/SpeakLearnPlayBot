services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - config/.env
    environment:
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file:
      - config/.env
    environment:
      POSTGRES_USER: ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
      POSTGRES_DB: ${DB_NAME:-speaklearnplaybot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-root} -d ${DB_NAME:-speaklearnplaybot}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
